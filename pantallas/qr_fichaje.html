<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>QR Fichaje | Portal del Viento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>.text-neon { color: #e4fc74; } .bg-neon { background-color: #e4fc74; }</style>
</head>
<body class="bg-gray-950 text-gray-200 font-sans min-h-screen flex flex-col items-center justify-center p-8">
    <div class="bg-black border border-gray-800 rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl">
        <h1 class="text-neon font-bold text-2xl tracking-widest uppercase mb-1">Portal del Viento</h1>
        <p class="text-white text-sm font-bold italic mb-6">ALFAJORES — Fichaje</p>

        <div class="bg-white p-4 rounded-xl inline-block mb-6" id="qr-container"></div>

        <p class="text-gray-400 text-sm mb-2">Escaneá este código para fichar</p>
        <p class="text-gray-600 text-xs mb-6">Pegalo en la entrada de la fábrica</p>

        <button onclick="window.print()" class="w-full bg-neon text-black font-bold py-3 rounded-xl hover:bg-yellow-300 transition">
            🖨️ Imprimir QR
        </button>
    </div>

    <style>
        @media print {
            body { background: white; }
            button { display: none; }
        }
    </style>

    <script>
        var url = window.location.protocol + '//' + window.location.hostname + ':8000/fichaje';
        new QRCode(document.getElementById('qr-container'), {
            text: url, width: 220, height: 220,
            colorDark: '#000000', colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
