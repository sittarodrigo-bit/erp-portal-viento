<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Armado de Pedidos | Portal del Viento</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{neon:'#d4ff3f'}}}}</script>
</head>
<body class="bg-gray-950 text-gray-200 font-sans min-h-screen">

  <!-- Header -->
  <header class="bg-black border-b border-gray-800 px-5 py-4 flex items-center justify-between sticky top-0 z-30">
    <div class="flex items-center gap-3">
      <h1 class="text-neon font-bold text-lg tracking-widest uppercase">Portal del Viento</h1>
      <span class="text-gray-600 text-sm">· Armado de pedidos</span>
    </div>
    <button onclick="cargarPedidos()" class="border border-gray-700 text-gray-300 hover:text-white px-4 py-2 rounded-lg text-sm">🔄 Actualizar</button>
  </header>

  <!-- Vista lista de pedidos -->
  <main id="vista-lista" class="p-5 max-w-3xl mx-auto">
    <h2 class="text-xl font-bold text-white mb-4">Pedidos por armar</h2>
    <div id="lista-pedidos" class="space-y-3">
      <p class="text-gray-500 text-center py-10">Cargando...</p>
    </div>
  </main>

  <!-- Vista detalle / armado -->
  <main id="vista-armado" class="hidden p-5 max-w-3xl mx-auto pb-32">
    <button onclick="volverLista()" class="text-gray-400 hover:text-white text-sm mb-4">← Volver a la lista</button>
    <div class="bg-black border border-gray-800 rounded-2xl p-5 mb-4">
      <div class="flex justify-between items-start">
        <div>
          <p class="text-gray-500 text-xs uppercase font-bold">Pedido</p>
          <h2 id="arm-titulo" class="text-2xl font-bold text-white"></h2>
          <p id="arm-distribuidor" class="text-neon font-bold mt-1"></p>
        </div>
        <div class="text-right">
          <select id="arm-estado-sel" onchange="cambiarEstadoArmado(this.value)" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-lg px-3 py-2 font-bold">
            <option value="Pendiente">⏳ Pendiente</option>
            <option value="En preparación">🛠️ En preparación</option>
            <option value="Terminado">✅ Terminado</option>
            <option value="Despachado">🚚 Despachado</option>
          </select>
          <p class="text-gray-600 text-xs mt-1">Cambiá el estado para revertir</p>
        </div>
      </div>
      <div class="mt-3">
        <div class="w-full bg-gray-900 rounded-full h-2 overflow-hidden">
          <div id="arm-progreso" class="bg-neon h-2 transition-all" style="width:0%"></div>
        </div>
        <p id="arm-progreso-txt" class="text-gray-500 text-xs mt-1.5"></p>
      </div>
    </div>

    <div id="arm-items" class="space-y-2"></div>

    <!-- Barra inferior fija -->
    <div class="fixed bottom-0 left-0 right-0 bg-black border-t border-gray-800 p-4">
      <div class="max-w-3xl mx-auto space-y-2">
        <div id="aviso-faltan" class="hidden text-center text-orange-400 text-sm font-bold"></div>
        <div class="flex gap-2">
          <button onclick="guardarYSeguir()" class="flex-1 border border-gray-700 text-gray-300 hover:text-white font-bold py-3 rounded-xl text-sm">💾 Guardar y seguir después</button>
          <button id="btn-parcial" onclick="despacharParcial()" class="flex-1 bg-orange-600 hover:bg-orange-500 text-white font-bold py-3 rounded-xl text-sm">📦 Despachar lo armado</button>
        </div>
        <button id="btn-listo" onclick="marcarListo()" class="w-full bg-neon text-black font-bold py-4 rounded-xl text-lg disabled:bg-gray-700 disabled:text-gray-500">✓ Pedido completo (despachar todo)</button>
      </div>
    </div>
  </main>

<script>
const API_URL = window.location.origin + "/api";
const $ = id => document.getElementById(id);
const fmt = n => '$' + (parseFloat(n)||0).toLocaleString('es-AR');
let pedidoActual = null;
let armadoPor = null;

// Identificar quién arma (de la sesión del POS o producción, si existe)
try {
  var s = sessionStorage.getItem('pos_usuario') || sessionStorage.getItem('usuario_produccion') || localStorage.getItem('usuario');
  if (s) { var u = JSON.parse(s); armadoPor = (u.nombre || '') + ' ' + (u.apellido || ''); }
} catch(e) {}

async function cargarPedidos(){
  const cont = $('lista-pedidos');
  cont.innerHTML = '<p class="text-gray-500 text-center py-10">Cargando...</p>';
  try{
    const pedidos = await fetch(`${API_URL}/armado/pedidos`).then(r=>r.json());
    if(!pedidos.length){
      cont.innerHTML = '<div class="text-center py-16 text-gray-500"><div class="text-5xl mb-3">✅</div>No hay pedidos pendientes de armar.</div>';
      return;
    }
    cont.innerHTML = pedidos.map(p => {
      const enPrep = p.estado === 'En preparación';
      const parcial = p.estado === 'Despachado parcial';
      const borde = parcial ? 'border-orange-600' : (enPrep ? 'border-neon' : 'border-gray-800');
      const badge = parcial
        ? '<span class="text-xs font-bold px-2 py-1 rounded-full bg-orange-600/20 text-orange-400">📦 Parcial — completar</span>'
        : (enPrep ? '<span class="text-xs font-bold px-2 py-1 rounded-full bg-neon/20 text-neon">🛠️ En preparación</span>'
                  : '<span class="text-xs font-bold px-2 py-1 rounded-full bg-gray-800 text-gray-400">⏳ Pendiente</span>');
      return `<button onclick="abrirPedido(${p.id})" class="w-full text-left bg-gray-900 border ${borde} rounded-xl p-4 hover:border-gray-600 transition">
        <div class="flex justify-between items-center">
          <div>
            <p class="text-white font-bold text-lg">Pedido #${p.id}</p>
            <p class="text-gray-400 text-sm">${p.distribuidor || 'Sin distribuidor'}</p>
          </div>
          <div class="text-right">
            <p class="text-neon font-bold">${fmt(p.total)}</p>
            ${badge}
          </div>
        </div>
      </button>`;
    }).join('');
  }catch(e){
    cont.innerHTML = '<p class="text-red-400 text-center py-10">No se pudieron cargar los pedidos.</p>';
  }
}

async function abrirPedido(id){
  try{
    // Si está pendiente, iniciar preparación
    const det = await fetch(`${API_URL}/armado/pedidos/${id}`).then(r=>r.json());
    if(det.estado === 'Pendiente'){
      await fetch(`${API_URL}/armado/pedidos/${id}/iniciar`, {method:'PUT'});
      det.estado = 'En preparación';
    }
    pedidoActual = det;
    renderArmado();
    $('vista-lista').classList.add('hidden');
    $('vista-armado').classList.remove('hidden');
    window.scrollTo(0,0);
  }catch(e){ alert('No se pudo abrir el pedido.'); }
}

function renderArmado(){
  const d = pedidoActual;
  $('arm-titulo').textContent = 'Pedido #' + d.id;
  $('arm-distribuidor').textContent = d.distribuidor || 'Sin distribuidor';
  var sel = $('arm-estado-sel'); if (sel) sel.value = d.estado || 'En preparación';
  const faltan = d.items.filter(i=>!i.completo);
  const hechos = d.items.filter(i=>i.completo);
  let html = '';
  if(faltan.length){
    html += '<p class="text-orange-400 text-xs font-bold uppercase mb-2 mt-1">⬜ Falta completar (' + faltan.length + ')</p>';
    html += faltan.map(renderItem).join('');
  }
  if(hechos.length){
    html += '<p class="text-neon text-xs font-bold uppercase mb-2 mt-5">✓ Completos (' + hechos.length + ')</p>';
    html += hechos.map(renderItem).join('');
  }
  $('arm-items').innerHTML = html;
  actualizarProgreso();
}

function renderItem(it){
  const prep = it.preparado || 0;
  const completo = it.completo;
  const pctItem = it.cantidad ? Math.round(prep/it.cantidad*100) : 0;
  return `<div class="bg-gray-900 border ${completo?'border-neon/50 bg-neon/5':'border-gray-800'} rounded-xl p-4 mb-2">
    <div class="flex items-center justify-between gap-3">
      <div class="flex-1 min-w-0">
        <p class="text-white font-bold">${it.nombre} ${completo?'<span class="text-neon">✓</span>':''}</p>
        <p class="text-gray-500 text-xs">Stock disponible: ${it.stock}</p>
      </div>
      <div class="flex items-center gap-2 flex-shrink-0">
        <button onclick="ajustar(${it.id_producto},-1)" class="w-11 h-11 rounded-lg bg-gray-800 text-white text-2xl flex items-center justify-center active:bg-gray-700">−</button>
        <div class="text-center min-w-[64px]">
          <p class="text-2xl font-bold ${completo?'text-neon':'text-white'}">${prep}<span class="text-gray-600 text-base">/${it.cantidad}</span></p>
        </div>
        <button onclick="ajustar(${it.id_producto},1)" class="w-11 h-11 rounded-lg bg-neon text-black text-2xl font-bold flex items-center justify-center active:scale-90">+</button>
      </div>
    </div>
    <div class="w-full bg-gray-800 rounded-full h-1.5 mt-3 overflow-hidden"><div class="bg-neon h-1.5 transition-all" style="width:${pctItem}%"></div></div>
  </div>`;
}

function actualizarProgreso(){
  const d = pedidoActual;
  const total = d.items.length;
  const completos = d.items.filter(i=>i.completo).length;
  const pct = total ? Math.round(completos/total*100) : 0;
  $('arm-progreso').style.width = pct + '%';
  $('arm-progreso-txt').textContent = completos + ' de ' + total + ' productos completos';
  $('btn-listo').disabled = completos < total;
  const algoArmado = d.items.some(i=>(i.preparado||0) > 0);
  const aviso = $('aviso-faltan');
  const btnParcial = $('btn-parcial');
  if(completos < total && algoArmado){
    aviso.classList.remove('hidden');
    aviso.textContent = '⚠️ Hay productos incompletos';
    btnParcial.classList.remove('hidden');
  } else {
    aviso.classList.add('hidden');
    btnParcial.classList.add('hidden');
  }
}

async function ajustar(idProd, delta){
  const it = pedidoActual.items.find(i=>i.id_producto===idProd);
  if(!it) return;
  const prep = it.preparado || 0;
  if(delta > 0 && prep >= it.cantidad) return; // ya está completo
  if(delta > 0 && it.stock <= 0){
    if(!confirm('Este producto no tiene stock disponible. ¿Igual lo cargás?')) return;
  }
  if(delta < 0 && prep <= 0) return;
  // Optimista
  const nuevoPrep = Math.max(0, Math.min(it.cantidad, prep + delta));
  const movimiento = nuevoPrep - prep;
  it.preparado = nuevoPrep;
  it.completo = nuevoPrep >= it.cantidad;
  if(movimiento > 0) it.stock = Math.max(0, it.stock - movimiento);
  else it.stock = it.stock + Math.abs(movimiento);
  renderArmado();
  try{
    const r = await fetch(`${API_URL}/armado/pedidos/${pedidoActual.id}/cantidad`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ id_producto: idProd, delta: delta, preparado_por: armadoPor })
    }).then(x=>x.json());
    // sincronizar con el valor real del server
    if(r && typeof r.cantidad === 'number'){ it.preparado = r.cantidad; it.completo = r.cantidad >= it.cantidad; renderArmado(); }
  }catch(e){
    // revertir
    it.preparado = prep; it.completo = prep >= it.cantidad; renderArmado();
    alert('No se pudo actualizar. ¿Corriste el SQL?');
  }
}

async function cambiarEstadoArmado(nuevoEstado){
  const d = pedidoActual;
  const ABIERTOS = ['Pendiente','En preparación'];
  const CON_STOCK = ['Terminado','Despachado','Despachado parcial'];
  if (CON_STOCK.includes(d.estado) && ABIERTOS.includes(nuevoEstado)) {
    if (!confirm('Al revertir a "' + nuevoEstado + '" se devuelve al stock todo lo que se había preparado, y vas a tener que volver a armar el pedido.\n\n¿Continuar?')) {
      $('arm-estado-sel').value = d.estado;
      return;
    }
  }
  try {
    await fetch(`${API_URL}/pedidos/${d.id}/estado?estado=${encodeURIComponent(nuevoEstado)}`, {method:'PUT'});
    const det = await fetch(`${API_URL}/armado/pedidos/${d.id}`).then(r=>r.json());
    const eraRevert = CON_STOCK.includes(d.estado) && ABIERTOS.includes(nuevoEstado);
    pedidoActual = det;
    renderArmado();
    if (eraRevert) alert('✅ Pedido revertido. El stock fue devuelto, ya podés editar o re-armar.');
  } catch(e) {
    alert('No se pudo cambiar el estado.');
    if ($('arm-estado-sel')) $('arm-estado-sel').value = d.estado;
  }
}

async function marcarListo(){
  if(!confirm('¿Marcar el pedido #' + pedidoActual.id + ' como completo y despachado?')) return;
  try{
    await fetch(`${API_URL}/armado/pedidos/${pedidoActual.id}/listo`, {method:'PUT'});
    alert('✅ Pedido despachado completo.');
    volverLista(); cargarPedidos();
  }catch(e){ alert('No se pudo marcar como listo.'); }
}

function guardarYSeguir(){
  // El estado y los tildes ya están guardados en la base. Solo volvemos.
  alert('💾 Guardado. El pedido queda En preparación, podés seguir cuando llegue stock.');
  volverLista(); cargarPedidos();
}

async function despacharParcial(){
  const faltan = pedidoActual.items.filter(i=>!i.completo).map(i=>'• ' + i.nombre + ': faltan ' + (i.cantidad-(i.preparado||0)) + ' de ' + i.cantidad);
  if(!confirm('Vas a despachar lo que cargaste.\n\nQueda pendiente:\n' + faltan.join('\n') + '\n\n¿Confirmás el despacho parcial?')) return;
  try{
    await fetch(`${API_URL}/armado/pedidos/${pedidoActual.id}/despacho_parcial`, {method:'PUT'});
    alert('📦 Despachado lo armado. Lo que faltó quedó registrado.');
    volverLista(); cargarPedidos();
  }catch(e){ alert('No se pudo despachar parcial.'); }
}

function volverLista(){
  pedidoActual = null;
  $('vista-armado').classList.add('hidden');
  $('vista-lista').classList.remove('hidden');
}

cargarPedidos();
</script>
</body>
</html>
