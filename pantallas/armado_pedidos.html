<!DOCTYPE html>
<html lang="es">
<head>
<script>window.PANEL_ACTUAL = "armado";</script>
<script src="/static/auth.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Armado de Pedidos | Portal del Viento</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{neon:'#d4ff3f'}}}}</script>
</head>
<body class="bg-gray-950 text-gray-200 font-sans min-h-screen">

  <!-- Header -->
  <header class="bg-black border-b border-gray-800 px-5 py-2.5 flex items-center justify-between sticky top-0 z-30">
    <div class="flex items-center gap-3">
      <h1 class="text-neon font-bold text-base tracking-widest uppercase">Portal del Viento</h1>
      <span class="text-gray-600 text-sm">· Armado de pedidos</span>
    </div>
    <button onclick="cargarPedidos()" class="border border-gray-700 text-gray-300 hover:text-white px-3 py-1.5 rounded-lg text-sm">🔄 Actualizar</button>
  </header>

  <!-- Vista lista de pedidos -->
  <main id="vista-lista" class="p-4 max-w-5xl mx-auto">
    <div class="flex gap-2 mb-3">
      <button onclick="cambiarTab('pendientes')" id="tab-pendientes" class="px-4 py-2 rounded-lg text-sm font-bold bg-neon text-black">📋 Por armar</button>
      <button onclick="cambiarTab('historial')" id="tab-historial" class="px-4 py-2 rounded-lg text-sm font-bold border border-gray-700 text-gray-300">📜 Historial</button>
    </div>
    <div id="cont-pendientes">
      <div id="lista-pedidos" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
        <p class="text-gray-500 text-center py-10 col-span-full">Cargando...</p>
      </div>
    </div>
    <div id="cont-historial" class="hidden">
      <div id="lista-historial" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
        <p class="text-gray-500 text-center py-10 col-span-full">Cargando...</p>
      </div>
    </div>
  </main>

  <!-- Vista detalle / armado -->
  <main id="vista-armado" class="hidden p-4 max-w-5xl mx-auto pb-32">
    <button onclick="volverLista()" class="text-gray-400 hover:text-white text-sm mb-3">← Volver a la lista</button>
    <div class="bg-black border border-gray-800 rounded-xl p-4 mb-3">
      <div class="flex justify-between items-center">
        <div class="flex items-baseline gap-3">
          <h2 id="arm-titulo" class="text-xl font-bold text-white"></h2>
          <p id="arm-distribuidor" class="text-neon font-bold text-sm"></p>
        </div>
        <div class="text-right">
          <span id="arm-estado-badge" class="text-gray-500 text-sm"></span>
        </div>
      </div>
      <div class="mt-2.5" id="arm-progreso-wrap">
        <div class="w-full bg-gray-900 rounded-full h-2 overflow-hidden">
          <div id="arm-progreso" class="bg-neon h-2 transition-all" style="width:0%"></div>
        </div>
        <p id="arm-progreso-txt" class="text-gray-500 text-xs mt-1.5"></p>
      </div>
    </div>

    <div id="arm-items" class="grid md:grid-cols-2 gap-2"></div>

    <!-- Barra inferior fija -->
    <div class="fixed bottom-0 left-0 right-0 bg-black border-t border-gray-800 p-3" id="arm-botonera">
      <div class="max-w-5xl mx-auto flex gap-2">
        <div id="aviso-faltan" class="hidden"></div>
        <button id="btn-parcial" onclick="despacharParcial()" class="flex-1 bg-orange-600 hover:bg-orange-500 text-white font-bold py-3 rounded-xl text-sm">📦 Despachar lo armado (finaliza)</button>
        <button id="btn-listo" onclick="marcarListo()" class="flex-1 bg-neon text-black font-bold py-3 rounded-xl text-base disabled:bg-gray-700 disabled:text-gray-500">✓ Pedido completo</button>
      </div>
    </div>
  </main>

<script>
const API_URL = window.location.origin + "/api";
const $ = id => document.getElementById(id);
const fmt = n => '$' + (parseFloat(n)||0).toLocaleString('es-AR');
let pedidoActual = null;
let armadoPor = null;

// Identificar quién arma (de la sesión del POS o producción, si existe)
try {
  var s = sessionStorage.getItem('pos_usuario') || sessionStorage.getItem('usuario_produccion') || localStorage.getItem('usuario');
  if (s) { var u = JSON.parse(s); armadoPor = (u.nombre || '') + ' ' + (u.apellido || ''); }
} catch(e) {}

async function cargarPedidos(){
  const cont = $('lista-pedidos');
  cont.innerHTML = '<p class="text-gray-500 text-center py-10">Cargando...</p>';
  try{
    const pedidos = await fetch(`${API_URL}/armado/pedidos`).then(r=>r.json());
    if(!pedidos.length){
      cont.innerHTML = '<div class="text-center py-16 text-gray-500"><div class="text-5xl mb-3">✅</div>No hay pedidos pendientes de armar.</div>';
      return;
    }
    cont.innerHTML = pedidos.map(p => {
      const enPrep = p.estado === 'En preparación';
      const parcial = p.estado === 'Despachado parcial';
      const esRepo = p.tipo === 'reposicion';
      const borde = esRepo ? 'border-blue-700' : (parcial ? 'border-orange-600' : (enPrep ? 'border-neon' : 'border-gray-800'));
      const badge = esRepo
        ? '<span class="text-xs font-bold px-2 py-1 rounded-full bg-blue-600/20 text-blue-300">🏪 Reposición local</span>'
        : (parcial
        ? '<span class="text-xs font-bold px-2 py-1 rounded-full bg-orange-600/20 text-orange-400">📦 Parcial — completar</span>'
        : (enPrep ? '<span class="text-xs font-bold px-2 py-1 rounded-full bg-neon/20 text-neon">🛠️ En preparación</span>'
                  : '<span class="text-xs font-bold px-2 py-1 rounded-full bg-gray-800 text-gray-400">⏳ Pendiente</span>'));
      const titulo = esRepo ? ('Reposición #' + String(p.id).replace('r','')) : ('Pedido #' + p.id);
      const nombre = p.nombre || p.distribuidor || 'Sin nombre';
      const montoTxt = (p.total !== null && p.total !== undefined) ? ('<p class="text-neon font-bold">' + fmt(p.total) + '</p>') : '';
      return `<button onclick="abrirPedido('${p.id}')" class="text-left bg-gray-900 border ${borde} rounded-xl p-3 hover:border-gray-600 transition h-full">
        <div class="flex justify-between items-start gap-2">
          <div class="min-w-0">
            <p class="text-white font-bold">${titulo}</p>
            <p class="text-gray-400 text-sm truncate">${nombre}</p>
          </div>
          ${montoTxt ? '<div class="text-right shrink-0">'+montoTxt+'</div>' : ''}
        </div>
        <div class="mt-2">${badge}</div>
      </button>`;
    }).join('');
  }catch(e){
    cont.innerHTML = '<p class="text-red-400 text-center py-10 col-span-full">No se pudieron cargar los pedidos.</p>';
  }
}

async function abrirPedido(id){
  try{
    // Si está pendiente, iniciar preparación
    const det = await fetch(`${API_URL}/armado/pedidos/${id}`).then(r=>r.json());
    if(det.estado === 'Pendiente'){
      await fetch(`${API_URL}/armado/pedidos/${id}/iniciar`, {method:'PUT'});
      det.estado = 'En preparación';
    }
    pedidoActual = det;
    renderArmado();
    $('vista-lista').classList.add('hidden');
    $('vista-armado').classList.remove('hidden');
    window.scrollTo(0,0);
  }catch(e){ alert('No se pudo abrir el pedido.'); }
}

function renderArmado(){
  const d = pedidoActual;
  const esRepo = d.tipo === 'reposicion';
  $('arm-titulo').textContent = esRepo ? ('Reposición #' + String(d.id).replace('r','')) : ('Pedido #' + d.id);
  $('arm-distribuidor').textContent = d.distribuidor || 'Sin distribuidor';
  var badge = $('arm-estado-badge'); if (badge) badge.textContent = d.estado || '';

  var prog = document.getElementById('arm-progreso-wrap'); if(prog) prog.style.display='';
  var botonera = document.getElementById('arm-botonera'); if(botonera) botonera.style.display='';

  const faltan = d.items.filter(i=>!i.completo);
  const hechos = d.items.filter(i=>i.completo);
  let html = '';
  if(esRepo){
    html += '<div class="bg-blue-900/20 border border-blue-800 rounded-xl p-3 mb-2 text-blue-200 text-sm col-span-full">🏪 Reposición de ' + (d.distribuidor||'local') + '. Cargá lo que vas preparando.</div>';
  }
  if(faltan.length){
    html += '<p class="text-orange-400 text-xs font-bold uppercase mb-1 mt-1 col-span-full">⬜ Falta completar (' + faltan.length + ')</p>';
    html += faltan.map(renderItem).join('');
  }
  if(hechos.length){
    html += '<p class="text-neon text-xs font-bold uppercase mb-1 mt-3 col-span-full">✓ Completos (' + hechos.length + ')</p>';
    html += hechos.map(renderItem).join('');
  }
  $('arm-items').innerHTML = html;
  actualizarProgreso();
}

function renderItem(it){
  const prep = it.preparado || 0;
  const completo = it.completo;
  const pctItem = it.cantidad ? Math.round(prep/it.cantidad*100) : 0;
  const idx = pedidoActual.items.indexOf(it);
  const esRepo = pedidoActual.tipo === 'reposicion';
  const esCaja = esRepo && it.es_caja && it.unidades_por_caja >= 2;
  const upc = it.unidades_por_caja || 12;
  const infoStock = esRepo ? '' : ' · Stock: ' + it.stock;
  // En modo caja: mostramos cajas en vez de unidades
  const cantMostrar = esCaja ? (it.cantidad / upc) : it.cantidad;
  const prepMostrar = esCaja ? (prep / upc) : prep;
  const unidad = esCaja ? 'cajas' : '';
  const subinfo = esCaja ? `<p class="text-amber-400 text-xs">📦 ${cantMostrar} caja(s) × ${upc} = ${it.cantidad} unidades</p>` : '';
  return `<div class="bg-gray-900 border ${completo?'border-neon/50 bg-neon/5':'border-gray-800'} rounded-xl p-3">
    <div class="flex items-center justify-between gap-2">
      <div class="flex-1 min-w-0">
        <p class="text-white font-bold text-sm">${it.nombre} ${completo?'<span class="text-neon">✓</span>':''}</p>
        <p class="text-gray-500 text-xs">Pedido: ${cantMostrar} ${unidad}${infoStock}</p>
        ${subinfo}
      </div>
      <div class="flex items-center gap-1.5 flex-shrink-0">
        <input type="number" inputmode="numeric" min="0" max="${cantMostrar}" value="${prepMostrar}"
               id="cant-${idx}"
               onkeydown="if(event.key==='Enter'){setearCant(${idx})}"
               class="w-16 bg-black border border-gray-600 focus:border-neon text-white text-center text-lg font-bold rounded-lg py-1.5 outline-none">
        <span class="text-gray-600 text-xs">/ ${cantMostrar}${esCaja?' cj':''}</span>
        <button onclick="setearCant(${idx})" class="bg-neon text-black font-bold px-3 py-2 rounded-lg active:scale-95 text-sm">OK</button>
      </div>
    </div>
    <div class="w-full bg-gray-800 rounded-full h-1.5 mt-3 overflow-hidden"><div class="bg-neon h-1.5 transition-all" style="width:${pctItem}%"></div></div>
  </div>`;
}

async function setearCant(idx){
  const it = pedidoActual.items[idx];
  if(!it) return;
  const input = document.getElementById('cant-'+idx);
  const esRepo = pedidoActual.tipo === 'reposicion';
  const esCaja = esRepo && it.es_caja && it.unidades_por_caja >= 2;
  const upc = it.unidades_por_caja || 12;
  let valorMostrado = parseInt(input.value);
  if(isNaN(valorMostrado) || valorMostrado < 0) valorMostrado = 0;
  // Convertir cajas → unidades para guardar (el sistema siempre maneja unidades por debajo)
  let valor = esCaja ? (valorMostrado * upc) : valorMostrado;
  if(valor > it.cantidad) valor = it.cantidad;
  const prep = it.preparado || 0;
  if(valor === prep){ return; } // sin cambios
  const diff = valor - prep;
  if(!esRepo && diff > 0 && diff > it.stock){
    if(!confirm('Estás cargando ' + diff + ' pero hay ' + it.stock + ' en stock. ¿Continuar igual? (el stock puede quedar en 0)')){
      input.value = esCaja ? (prep/upc) : prep; return;
    }
  }
  const stockAnterior = it.stock;
  it.preparado = valor;
  it.completo = valor >= it.cantidad;
  if(!esRepo) it.stock = Math.max(0, it.stock - diff);
  renderArmado();
  try{
    const body = { id_producto: it.id_producto, cantidad: valor, preparado_por: armadoPor };
    if(esRepo) body.sabor = it.sabor || '';
    const r = await fetch(`${API_URL}/armado/pedidos/${pedidoActual.id}/setear_cantidad`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body)
    }).then(x=>x.json());
    if(r && typeof r.cantidad === 'number'){ it.preparado = r.cantidad; it.completo = r.cantidad >= it.cantidad; renderArmado(); }
  }catch(e){
    it.preparado = prep; it.completo = prep >= it.cantidad; it.stock = stockAnterior; renderArmado();
    alert('No se pudo guardar. ¿Corriste el SQL?');
  }
}

function actualizarProgreso(){
  const d = pedidoActual;
  const total = d.items.length;
  const completos = d.items.filter(i=>i.completo).length;
  const pct = total ? Math.round(completos/total*100) : 0;
  $('arm-progreso').style.width = pct + '%';
  $('arm-progreso-txt').textContent = completos + ' de ' + total + ' productos completos';
  $('btn-listo').disabled = completos < total;
  const algoArmado = d.items.some(i=>(i.preparado||0) > 0);
  const aviso = $('aviso-faltan');
  const btnParcial = $('btn-parcial');
  if(completos < total && algoArmado){
    aviso.classList.remove('hidden');
    aviso.textContent = '⚠️ Hay productos incompletos';
    btnParcial.classList.remove('hidden');
  } else {
    aviso.classList.add('hidden');
    btnParcial.classList.add('hidden');
  }
}



async function marcarListo(){
  if(!confirm('¿Marcar el pedido #' + pedidoActual.id + ' como completo y despachado?')) return;
  try{
    await fetch(`${API_URL}/armado/pedidos/${pedidoActual.id}/listo`, {method:'PUT'});
    alert('✅ Pedido despachado completo.');
    volverLista(); cargarPedidos();
  }catch(e){ alert('No se pudo marcar como listo.'); }
}

async function despacharParcial(){
  const faltan = pedidoActual.items.filter(i=>!i.completo).map(i=>'• ' + i.nombre + ': faltan ' + (i.cantidad-(i.preparado||0)) + ' de ' + i.cantidad);
  if(!confirm('Vas a despachar lo que cargaste y FINALIZAR el armado.\n\nQueda pendiente:\n' + faltan.join('\n') + '\n\nSi después necesitás cambiar algo, reabrílo desde el panel de pedidos o de locales.\n\n¿Confirmás?')) return;
  try{
    await fetch(`${API_URL}/armado/pedidos/${pedidoActual.id}/despacho_parcial`, {method:'PUT'});
    alert('📦 Despachado lo armado. Lo que faltó quedó registrado.');
    volverLista(); cargarPedidos();
  }catch(e){ alert('No se pudo despachar parcial.'); }
}

function volverLista(){
  pedidoActual = null;
  $('vista-armado').classList.add('hidden');
  $('vista-lista').classList.remove('hidden');
}


function cambiarTab(tab){
  const esPend = tab === 'pendientes';
  document.getElementById('cont-pendientes').classList.toggle('hidden', !esPend);
  document.getElementById('cont-historial').classList.toggle('hidden', esPend);
  document.getElementById('tab-pendientes').className = 'px-4 py-2 rounded-lg text-sm font-bold ' + (esPend?'bg-neon text-black':'border border-gray-700 text-gray-300');
  document.getElementById('tab-historial').className = 'px-4 py-2 rounded-lg text-sm font-bold ' + (!esPend?'bg-neon text-black':'border border-gray-700 text-gray-300');
  if(!esPend) cargarHistorial();
}

async function cargarHistorial(){
  const cont = document.getElementById('lista-historial');
  cont.innerHTML = '<p class="text-gray-500 text-center py-10">Cargando...</p>';
  try{
    const hist = await fetch(`${API_URL}/armado/historial`).then(r=>r.json());
    if(!hist.length){ cont.innerHTML = '<div class="text-center py-12 text-gray-500"><div class="text-4xl mb-2">\ud83d\udce4</div>Todav\u00eda no hay pedidos armados.</div>'; return; }
    cont.innerHTML = hist.map(function(p){
      const esRepo = p.tipo === 'reposicion';
      const titulo = esRepo ? ('Reposici\u00f3n #' + String(p.id).replace('r','')) : ('Pedido #' + p.id);
      const badge = esRepo
        ? '<span class="text-xs font-bold px-2 py-1 rounded-full bg-blue-600/20 text-blue-300">\ud83c\udfea Local</span>'
        : '<span class="text-xs font-bold px-2 py-1 rounded-full bg-gray-700 text-gray-300">\ud83d\ude9a Distribuidor</span>';
      const fecha = (p.fecha||'').replace('T',' ').substring(0,16);
      const montoTxt = (p.total!==null && p.total!==undefined) ? ('<p class="text-gray-400 text-sm">'+fmt(p.total)+'</p>') : '';
      const quien = p.armado_por ? ('<p class="text-neon text-xs mt-0.5">\ud83d\udc64 Armó: '+p.armado_por+'</p>') : '';
      return '<button onclick="abrirPedido(\''+p.id+'\')" class="w-full text-left bg-gray-900 border border-gray-800 rounded-xl p-4 hover:border-gray-600 transition">'+
        '<div class="flex justify-between items-center"><div>'+
        '<p class="text-white font-bold">'+titulo+'</p>'+
        '<p class="text-gray-400 text-sm">'+p.nombre+'</p>'+
        quien+
        '<p class="text-gray-600 text-xs mt-1">'+fecha+' \u00b7 '+p.estado+'</p>'+
        '</div><div class="text-right">'+montoTxt+badge+'</div></div></button>';
    }).join('');
  }catch(e){ cont.innerHTML = '<p class="text-red-400 text-center py-10">No se pudo cargar el historial.</p>'; }
}

cargarPedidos();

</script>
</body>
</html>
