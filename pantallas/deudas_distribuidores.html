<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deudas de Distribuidores | Portal del Viento</title>
<script>window.PANEL_ACTUAL = "distribuidores";</script>
<script src="/static/auth.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{neon:'#d4ff3f'}}}}</script>
</head>
<body class="bg-gray-950 text-gray-200 font-sans min-h-screen">

  <header class="bg-black border-b border-gray-800 px-6 py-4 flex items-center justify-between sticky top-0 z-20">
    <div class="flex items-center gap-3">
      <a href="/admin" class="text-gray-400 hover:text-white text-sm">← Panel</a>
      <h1 class="text-neon font-bold text-lg">📕 Deudas de Distribuidores</h1>
    </div>
    <div class="flex gap-2">
      <button onclick="imprimir()" class="border border-gray-700 text-gray-300 hover:text-white px-4 py-2 rounded-lg text-sm">🖨️ Imprimir</button>
      <button onclick="cargar()" class="border border-gray-700 text-gray-300 hover:text-white px-4 py-2 rounded-lg text-sm">🔄 Actualizar</button>
    </div>
  </header>

  <main class="p-6 max-w-4xl mx-auto">
    <div id="resumen"></div>
    <div id="lista"><p class="text-gray-500 text-center py-16">Cargando...</p></div>
  </main>

<script>
const API_URL = window.location.origin + "/api";
const $ = id => document.getElementById(id);
const fmt = n => '$' + (Math.round(parseFloat(n)||0)).toLocaleString('es-AR');
let data = null;

async function cargar(){
  $('lista').innerHTML = '<p class="text-gray-500 text-center py-16">Cargando...</p>';
  $('resumen').innerHTML = '';
  try{
    data = await fetch(`${API_URL}/deudas_distribuidores`).then(r=>r.json());
    render();
  }catch(e){ $('lista').innerHTML = '<p class="text-red-400 text-center py-16">No se pudo cargar.</p>'; }
}

function colorDias(dias){
  if(dias === null || dias === undefined) return 'text-gray-500';
  if(dias >= 60) return 'text-red-400';
  if(dias >= 30) return 'text-amber-400';
  return 'text-gray-400';
}
function textoDias(dias){
  if(dias === null || dias === undefined) return 'sin fecha';
  if(dias === 0) return 'hoy';
  if(dias === 1) return 'hace 1 día';
  return 'hace ' + dias + ' días';
}

function render(){
  if(!data || data.cantidad === 0){
    $('resumen').innerHTML = '<div class="bg-green-900/30 border border-green-800 rounded-2xl p-6 text-center text-green-300 mb-5"><div class="text-4xl mb-2">✅</div>¡Excelente! Ningún distribuidor tiene deuda pendiente.</div>';
    $('lista').innerHTML = '';
    return;
  }
  $('resumen').innerHTML = '<div class="bg-gradient-to-r from-red-900/40 to-gray-900 border border-red-800/50 rounded-2xl p-6 mb-5 text-center">' +
    '<p class="text-gray-400 text-sm uppercase font-bold">Total a cobrar (plata en la calle)</p>' +
    '<p class="text-red-400 font-bold text-5xl mt-1">' + fmt(data.total) + '</p>' +
    '<p class="text-gray-500 text-sm mt-1">' + data.cantidad + ' distribuidor(es) con deuda</p></div>';

  $('lista').innerHTML = data.deudores.map((d, i) => {
    const wsp = (d.telefono||'').replace(/[^0-9]/g,'');
    const msg = encodeURIComponent('Hola ' + d.distribuidor + ', te recordamos que tenés un saldo pendiente de ' + fmt(d.debe) + ' con Portal del Viento. ¡Gracias!');
    const vieja = (d.dias_deuda !== null && d.dias_deuda >= 30);
    return `<div class="bg-black border ${vieja?'border-red-800/60':'border-gray-800'} rounded-2xl p-4 mb-2">
      <div class="flex justify-between items-center gap-4 flex-wrap">
        <div class="flex items-center gap-3">
          <span class="text-gray-600 font-bold text-lg w-6 text-center">${i+1}</span>
          <div>
            <p class="text-white font-bold">${d.distribuidor}</p>
            <p class="text-xs ${colorDias(d.dias_deuda)}">${vieja?'⚠️ ':''}Deuda más antigua: ${textoDias(d.dias_deuda)}</p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-red-400 font-bold text-xl">${fmt(d.debe)}</span>
          ${wsp?`<a href="https://wa.me/54${wsp}?text=${msg}" target="_blank" class="text-xs bg-green-700 hover:bg-green-600 text-white px-3 py-2 rounded-lg font-bold whitespace-nowrap">💬 Reclamar</a>`:''}
          <a href="/distribuidores" class="text-xs border border-gray-700 text-gray-300 hover:text-white px-3 py-2 rounded-lg whitespace-nowrap">Ver detalle</a>
        </div>
      </div>
    </div>`;
  }).join('');
}

function imprimir(){
  if(!data || data.cantidad === 0){ alert('No hay deudas para imprimir.'); return; }
  const filas = data.deudores.map((d,i) =>
    '<tr><td>' + (i+1) + '</td><td>' + d.distribuidor + '</td><td>' + textoDias(d.dias_deuda) + '</td><td style="text-align:right">$' + Math.round(d.debe).toLocaleString('es-AR') + '</td></tr>'
  ).join('');
  const html = '<html><head><title>Deudas de Distribuidores</title><style>' +
    'body{font-family:Arial,sans-serif;padding:24px;color:#000}h1{font-size:20px;margin:0}p{color:#555;font-size:12px;margin:4px 0 16px}' +
    'table{width:100%;border-collapse:collapse;font-size:13px}th,td{border:1px solid #999;padding:8px}th{background:#eee;text-align:left}' +
    '.total{margin-top:16px;font-size:20px;font-weight:bold;text-align:right}</style></head><body>' +
    '<h1>Deudas de Distribuidores — Portal del Viento</h1><p>Generado: ' + new Date().toLocaleString('es-AR') + '</p>' +
    '<table><thead><tr><th>#</th><th>Distribuidor</th><th>Deuda más antigua</th><th style="text-align:right">Debe</th></tr></thead><tbody>' + filas + '</tbody></table>' +
    '<p class="total">TOTAL A COBRAR: $' + Math.round(data.total).toLocaleString('es-AR') + '</p></body></html>';
  const w = window.open('','_blank'); w.document.write(html); w.document.close(); w.focus();
  setTimeout(()=>w.print(), 300);
}

cargar();
</script>
</body>
</html>
